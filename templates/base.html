<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}CloudVPS — Pro Hosting Panel{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#0052ff;
  --primary-active:#003ecc;
  --primary-disabled:#a8b8cc;
  --ink:#0a0b0d;
  --body:#5b616e;
  --muted:#7c828a;
  --muted-soft:#a8acb3;
  --hairline:#dee1e6;
  --hairline-soft:#eef0f3;
  --canvas:#ffffff;
  --surface-soft:#f7f7f7;
  --surface-card:#ffffff;
  --surface-strong:#eef0f3;
  --surface-dark:#0a0b0d;
  --surface-dark-elevated:#16181c;
  --on-primary:#ffffff;
  --on-dark:#ffffff;
  --on-dark-soft:#a8acb3;
  --ok:#05b169;
  --warn:#f4b000;
  --danger:#cf202f;
}
html,body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.5}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* NAV */
.nav{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 32px;height:64px;
  background:var(--canvas);
  border-bottom:1px solid var(--hairline);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px;letter-spacing:-0.3px;color:var(--ink);text-decoration:none}
.brand .logo{width:32px;height:32px;border-radius:9999px;background:var(--primary);display:grid;place-items:center;font-size:15px;color:#fff;flex-shrink:0}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{color:var(--ink);font-size:14px;font-weight:500;text-decoration:none}
.nav-links a:hover{color:var(--primary);text-decoration:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;height:44px;border-radius:100px;border:0;cursor:pointer;font-weight:600;font-size:16px;font-family:inherit;transition:background-color .15s,opacity .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--primary);color:var(--on-primary)}
.btn-primary:hover{background:var(--primary-active);text-decoration:none;color:#fff}
.btn-secondary{background:var(--surface-strong);color:var(--ink)}
.btn-secondary:hover{background:var(--hairline);text-decoration:none;color:var(--ink)}
.btn-dark{background:var(--surface-dark-elevated);color:var(--on-dark)}
.btn-dark:hover{background:#1f2227;text-decoration:none;color:#fff}
.btn-outline-dark{background:transparent;color:var(--on-dark);border:1px solid rgba(255,255,255,0.3)}
.btn-outline-dark:hover{background:rgba(255,255,255,0.08);text-decoration:none;color:#fff}
.btn-ok{background:var(--ok);color:#fff}
.btn-ok:hover{background:#04986e;text-decoration:none;color:#fff}
.btn-warn{background:var(--warn);color:#000}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#b01a28;text-decoration:none;color:#fff}
.btn-sm{padding:8px 16px;height:36px;font-size:14px;border-radius:100px}
.btn-lg{padding:16px 32px;height:56px;font-size:16px;border-radius:100px}

/* LAYOUT */
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.section{padding:96px 0}
.section-sm{padding:48px 0}

/* CARDS */
.card{background:var(--surface-card);border:1px solid var(--hairline);border-radius:24px;padding:32px}
.card-sm{background:var(--surface-card);border:1px solid var(--hairline);border-radius:16px;padding:20px}
.card-dark{background:var(--surface-dark-elevated);border-radius:24px;padding:32px;color:var(--on-dark)}
.card+.card{margin-top:16px}

/* HERO DARK BAND */
.hero-dark{background:var(--surface-dark);color:var(--on-dark);padding:96px 0}
.hero-dark h1{color:var(--on-dark)}
.hero-dark p{color:var(--on-dark-soft)}

/* TYPOGRAPHY */
h1{font-size:48px;font-weight:400;line-height:1.05;letter-spacing:-1.2px;color:var(--ink)}
h2{font-size:36px;font-weight:400;line-height:1.1;letter-spacing:-0.5px;color:var(--ink)}
h3{font-size:18px;font-weight:600;line-height:1.33;color:var(--ink)}
h4{font-size:16px;font-weight:600;line-height:1.25;color:var(--ink)}
p{color:var(--body);line-height:1.6}

/* FORM */
input,select,textarea{
  padding:14px 16px;height:48px;border-radius:12px;border:1px solid var(--hairline);
  background:var(--canvas);color:var(--ink);font-size:16px;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;width:100%;
}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);border-width:2px;box-shadow:none}
textarea{height:auto;resize:vertical}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:var(--surface-strong);color:var(--ink)}
.badge-ok{background:rgba(5,177,105,0.12);color:var(--ok)}
.badge-danger{background:rgba(207,32,47,0.1);color:var(--danger)}
.badge-warn{background:rgba(244,176,0,0.15);color:#8a6200}
.badge-blue{background:rgba(0,82,255,0.1);color:var(--primary)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:12px 16px;text-align:left;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--hairline)}
td{padding:14px 16px;border-bottom:1px solid var(--hairline-soft);color:var(--ink)}
tr:last-child td{border-bottom:0}

/* UTILS */
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row>input{flex:1;min-width:120px}
.muted{color:var(--muted);font-size:14px}
.num{font-family:'JetBrains Mono',monospace;font-weight:500}
code{background:var(--surface-strong);color:var(--ink);padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px}
form.inline{display:inline}

/* FOOTER */
.footer{background:var(--canvas);border-top:1px solid var(--hairline);padding:48px 32px;text-align:center;color:var(--muted);font-size:14px}

/* CTA BAND */
.cta-band{background:var(--surface-dark);color:var(--on-dark);padding:96px 0;text-align:center}
.cta-band h2{color:var(--on-dark)}
.cta-band p{color:var(--on-dark-soft)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><span class="logo">⚡</span><span>CloudVPS</span></a>
  <div class="nav-links">
    <a href="/pricing">Pricing</a>
    {% if session.get('role') == 'owner' %}
    <a href="/owner">Dashboard</a>
    <a href="/logout" class="btn btn-secondary btn-sm" style="text-decoration:none">Logout</a>
    {% elif session.get('role') == 'user' %}
    <a href="/user">My Panel</a>
    <a href="/logout" class="btn btn-secondary btn-sm" style="text-decoration:none">Logout</a>
    {% else %}
    <a href="/login" class="btn btn-primary btn-sm" style="text-decoration:none">Sign In</a>
    {% endif %}
  </div>
</nav>
{% block body %}{% endblock %}
<div class="footer">© 2026 CloudVPS · Built on Railway · Made for developers</div>
</body>
</html>
