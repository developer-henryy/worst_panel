{% extends "base.html" %}
{% block title %}Sign In — CloudVPS{% endblock %}
{% block body %}
<div class="hero-dark" style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:420px;padding:0 24px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:64px;height:64px;border-radius:9999px;background:var(--primary);display:inline-grid;place-items:center;font-size:28px;margin-bottom:20px">⚡</div>
      <h1 style="font-size:32px;color:var(--on-dark);margin-bottom:8px">Welcome back</h1>
      <p style="color:var(--on-dark-soft);font-size:15px">Sign in to your CloudVPS panel</p>
    </div>
    <form method="post">
      {% if error %}
      <div style="background:rgba(207,32,47,0.15);color:#ff6b7a;padding:14px 16px;border-radius:12px;margin-bottom:16px;font-size:14px;border:1px solid rgba(207,32,47,0.3)">⚠ {{error}}</div>
      {% endif %}
      <div style="margin-bottom:12px">
        <input name="username" placeholder="Username" autofocus required style="background:var(--surface-dark-elevated);border:1px solid rgba(255,255,255,0.1);color:var(--on-dark);border-radius:12px">
      </div>
      <div style="margin-bottom:20px">
        <input name="password" type="password" placeholder="Password" required style="background:var(--surface-dark-elevated);border:1px solid rgba(255,255,255,0.1);color:var(--on-dark);border-radius:12px">
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;font-size:16px">Sign In →</button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--on-dark-soft)">Owner & User accounts supported</p>
    </form>
  </div>
</div>
{% endblock %}
